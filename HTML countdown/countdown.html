<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .stage {
    position: relative;
    width: min(96vw, 1672px);
    aspect-ratio: 1672 / 941;
    max-height: 96vh;
  }

  .device {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background-image: url('countdown_device.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    -webkit-mask-image: radial-gradient(
      ellipse 58% 72% at center,
      rgba(0,0,0,1) 0%,
      rgba(0,0,0,1) 42%,
      rgba(0,0,0,0.85) 62%,
      rgba(0,0,0,0.35) 82%,
      rgba(0,0,0,0) 100%
    );
    mask-image: radial-gradient(
      ellipse 58% 72% at center,
      rgba(0,0,0,1) 0%,
      rgba(0,0,0,1) 42%,
      rgba(0,0,0,0.85) 62%,
      rgba(0,0,0,0.35) 82%,
      rgba(0,0,0,0) 100%
    );
  }

  /* Display panel sized and placed against the 1672x941 source image. */
  .display {
    position: absolute;
    left: 25%;
    top: 37.088%;
    width: 48.325%;
    height: 15.728%;
  }

  /* Each digit is absolutely positioned within the display container.
     Width 9.6535% of container, full height. */
  .digit-wrap {
    position: absolute;
    width: 9.6535%;
    height: 100%;
    top: 0;
  }

  .digit-wrap[data-position="d0"] { left:  0.000%; }
  .digit-wrap[data-position="d1"] { left: 11.139%; }
  .digit-wrap[data-position="h0"] { left: 25.990%; }
  .digit-wrap[data-position="h1"] { left: 37.129%; }
  .digit-wrap[data-position="m0"] { left: 52.599%; }
  .digit-wrap[data-position="m1"] { left: 63.738%; }
  .digit-wrap[data-position="s0"] { left: 79.208%; }
  .digit-wrap[data-position="s1"] { left: 90.347%; }

  .digit {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Colons: positioned between groups */
  .colon {
    position: absolute;
    top: 22%;
    bottom: 22%;
    width: 2%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-around;
  }

  .colon[data-pos="c1"] { left: 21.3%; }  /* between days and hours */
  .colon[data-pos="c2"] { left: 47.9%; }  /* between hours and minutes */
  .colon[data-pos="c3"] { left: 74.5%; }  /* between minutes and seconds */

  .colon .dot {
    width: 22%;
    aspect-ratio: 1;
    border-radius: 50%;
    background: #ff1a1a;
    box-shadow:
      0 0 4px #ff3030,
      0 0 9px rgba(255, 26, 26, 0.7);
    animation: colonPulse 1s steps(1, end) infinite;
  }

  @keyframes colonPulse {
    0%, 49% { opacity: 0.95; }
    50%, 100% { opacity: 0.35; }
  }

  /* Seven-segment colours */
  .seg {
    fill: #2a0606;
    transition: fill 120ms ease-out, filter 120ms ease-out;
  }

  .seg.on {
    fill: #ff1a1a;
    filter:
      drop-shadow(0 0 1.2px #ff3030)
      drop-shadow(0 0 2.5px rgba(255, 26, 26, 0.75));
  }
</style>
</head>
<body>

<div class="stage">
  <div class="device"></div>

  <div class="display">
    <div class="digit-wrap" data-position="d0"><svg class="digit" viewBox="0 0 60 100" preserveAspectRatio="xMidYMid meet"></svg></div>
    <div class="digit-wrap" data-position="d1"><svg class="digit" viewBox="0 0 60 100" preserveAspectRatio="xMidYMid meet"></svg></div>

    <div class="colon" data-pos="c1"><span class="dot"></span><span class="dot"></span></div>

    <div class="digit-wrap" data-position="h0"><svg class="digit" viewBox="0 0 60 100" preserveAspectRatio="xMidYMid meet"></svg></div>
    <div class="digit-wrap" data-position="h1"><svg class="digit" viewBox="0 0 60 100" preserveAspectRatio="xMidYMid meet"></svg></div>

    <div class="colon" data-pos="c2"><span class="dot"></span><span class="dot"></span></div>

    <div class="digit-wrap" data-position="m0"><svg class="digit" viewBox="0 0 60 100" preserveAspectRatio="xMidYMid meet"></svg></div>
    <div class="digit-wrap" data-position="m1"><svg class="digit" viewBox="0 0 60 100" preserveAspectRatio="xMidYMid meet"></svg></div>

    <div class="colon" data-pos="c3"><span class="dot"></span><span class="dot"></span></div>

    <div class="digit-wrap" data-position="s0"><svg class="digit" viewBox="0 0 60 100" preserveAspectRatio="xMidYMid meet"></svg></div>
    <div class="digit-wrap" data-position="s1"><svg class="digit" viewBox="0 0 60 100" preserveAspectRatio="xMidYMid meet"></svg></div>
  </div>
</div>

<script>
(function () {
  // Seven-segment paths inside a 60 x 100 viewBox.
  //
  //   aaaaa
  //  f     b
  //   ggggg
  //  e     c
  //   ddddd

  var W = 60, H = 100;
  var pad = 5;
  var thick = 8;
  var gap = 1.5;
  var midY = H / 2;
  var topY = pad;
  var botY = H - pad;
  var leftX = pad;
  var rightX = W - pad;

  function hSeg(x1, x2, y, t) {
    var half = t / 2;
    return [
      'M', x1 + half, y - half,
      'L', x2 - half, y - half,
      'L', x2, y,
      'L', x2 - half, y + half,
      'L', x1 + half, y + half,
      'L', x1, y,
      'Z'
    ].join(' ');
  }

  function vSeg(x, y1, y2, t) {
    var half = t / 2;
    return [
      'M', x - half, y1 + half,
      'L', x, y1,
      'L', x + half, y1 + half,
      'L', x + half, y2 - half,
      'L', x, y2,
      'L', x - half, y2 - half,
      'Z'
    ].join(' ');
  }

  var segPaths = {
    a: hSeg(leftX + gap, rightX - gap, topY, thick),
    b: vSeg(rightX, topY + gap, midY - gap / 2, thick),
    c: vSeg(rightX, midY + gap / 2, botY - gap, thick),
    d: hSeg(leftX + gap, rightX - gap, botY, thick),
    e: vSeg(leftX, midY + gap / 2, botY - gap, thick),
    f: vSeg(leftX, topY + gap, midY - gap / 2, thick),
    g: hSeg(leftX + gap, rightX - gap, midY, thick)
  };

  var digitMap = {
    '0': ['a', 'b', 'c', 'd', 'e', 'f'],
    '1': ['b', 'c'],
    '2': ['a', 'b', 'g', 'e', 'd'],
    '3': ['a', 'b', 'g', 'c', 'd'],
    '4': ['f', 'g', 'b', 'c'],
    '5': ['a', 'f', 'g', 'c', 'd'],
    '6': ['a', 'f', 'g', 'e', 'c', 'd'],
    '7': ['a', 'b', 'c'],
    '8': ['a', 'b', 'c', 'd', 'e', 'f', 'g'],
    '9': ['a', 'b', 'c', 'd', 'f', 'g']
  };

  var SVG_NS = 'http://www.w3.org/2000/svg';
  var svgs = document.querySelectorAll('svg.digit');
  svgs.forEach(function (svg) {
    Object.keys(segPaths).forEach(function (key) {
      var path = document.createElementNS(SVG_NS, 'path');
      path.setAttribute('d', segPaths[key]);
      path.setAttribute('class', 'seg');
      path.setAttribute('data-seg', key);
      svg.appendChild(path);
    });
  });

  function setDigit(svg, value) {
    var active = value != null ? digitMap[value] || [] : [];
    svg.querySelectorAll('.seg').forEach(function (p) {
      var key = p.getAttribute('data-seg');
      if (active.indexOf(key) !== -1) {
        p.classList.add('on');
      } else {
        p.classList.remove('on');
      }
    });
  }

  function pad2(n) {
    n = Math.max(0, Math.floor(n));
    if (n > 99) n = 99;
    return ('0' + n).slice(-2);
  }

  // Target: 30 June 2026 at 23:59 local time (end of EOFY day).
  var target = new Date(2026, 5, 30, 23, 59, 0, 0); // month index 5 = June

  function getSvg(pos) {
    return document.querySelector('.digit-wrap[data-position="' + pos + '"] svg.digit');
  }

  var refs = {
    d0: getSvg('d0'), d1: getSvg('d1'),
    h0: getSvg('h0'), h1: getSvg('h1'),
    m0: getSvg('m0'), m1: getSvg('m1'),
    s0: getSvg('s0'), s1: getSvg('s1')
  };

  function tick() {
    var diff = target - new Date();
    if (diff <= 0) {
      ['d0','d1','h0','h1','m0','m1','s0','s1'].forEach(function (k) {
        setDigit(refs[k], '0');
      });
      return false;
    }
    var totalSeconds = Math.floor(diff / 1000);
    var days = Math.floor(totalSeconds / 86400);
    var hours = Math.floor((totalSeconds % 86400) / 3600);
    var minutes = Math.floor((totalSeconds % 3600) / 60);
    var seconds = totalSeconds % 60;

    var d = pad2(days), h = pad2(hours), m = pad2(minutes), s = pad2(seconds);
    setDigit(refs.d0, d[0]); setDigit(refs.d1, d[1]);
    setDigit(refs.h0, h[0]); setDigit(refs.h1, h[1]);
    setDigit(refs.m0, m[0]); setDigit(refs.m1, m[1]);
    setDigit(refs.s0, s[0]); setDigit(refs.s1, s[1]);
    return true;
  }

  tick();
  setInterval(tick, 1000);
})();
</script>

</body>
</html>
